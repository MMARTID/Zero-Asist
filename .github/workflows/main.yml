name: CI

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Format check (black)
        run: |
          pip install black
          black --check app/

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 app/

      - name: Test (pytest)
        run: |
          pip install pytest
          pytest tests/